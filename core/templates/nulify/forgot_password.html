{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Nullify</title>
    <meta name="description" content="Reset your Nullify password">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-bg-effects">
            <div class="cyber-grid-bg"></div>
            <div class="auth-orb auth-orb-1"></div>
            <div class="auth-orb auth-orb-2"></div>
            <div class="scanline-overlay"></div>
        </div>

        <div class="auth-container animate-fade">
            <div class="auth-card auth-card-centered">
                <!-- Icon -->
                <div class="auth-icon-wrapper">
                    <div class="auth-icon auth-icon-blue">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="M22 7l-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                    </div>
                </div>

                <h2 class="auth-title auth-title-lg">Forgot Password</h2>
                <p class="auth-subtitle">Enter your email address and we'll send you a verification code.</p>

                {% if messages %}
                {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
                {% endfor %}
                {% endif %}

                <form method="post" action="{% url 'forgot_password' %}" id="forgot-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="forgot-email">Email Address</label>
                        <input type="email" name="email" id="forgot-email" class="form-control" placeholder="name@organization.org" autocomplete="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full btn-lg auth-submit-btn" id="send-otp-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                        Send Verification Code
                    </button>
                </form>

                <div class="auth-back-link">
                    <a href="{% url 'login' %}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
                        Back to Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/base.js' %}"></script>
</body>
</html>
