{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP — Nullify</title>
    <meta name="description" content="Verify your OTP to reset your password">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-bg-effects">
            <div class="cyber-grid-bg"></div>
            <div class="auth-orb auth-orb-1"></div>
            <div class="auth-orb auth-orb-2"></div>
            <div class="scanline-overlay"></div>
        </div>

        <div class="auth-container animate-fade">
            <div class="auth-card auth-card-centered">
                <!-- Icon -->
                <div class="auth-icon-wrapper">
                    <div class="auth-icon auth-icon-teal">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                </div>

                <h2 class="auth-title auth-title-lg">Verify OTP</h2>
                <p class="auth-subtitle">Enter the OTP sent to your email</p>

                {% if messages %}
                {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
                {% endfor %}
                {% endif %}

                <form method="post" action="{% url 'verify_otp' %}" id="otp-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Enter OTP</label>
                        <div class="otp-input-group" id="otp-input-group">
                            <input type="text" name="otp_1" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="one-time-code" required id="otp-1">
                            <input type="text" name="otp_2" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required id="otp-2">
                            <input type="text" name="otp_3" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required id="otp-3">
                            <input type="text" name="otp_4" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required id="otp-4">
                            <input type="text" name="otp_5" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required id="otp-5">
                            <input type="text" name="otp_6" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required id="otp-6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-full btn-lg auth-submit-btn" id="verify-otp-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>
                        Verify OTP
                    </button>
                </form>

                <div class="auth-resend-link">
                    <a href="{% url 'resend_otp' %}" id="resend-otp-link">Resend OTP</a>
                </div>

                <div class="auth-secure-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Protected by Nullify SecureAuth™
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/base.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
